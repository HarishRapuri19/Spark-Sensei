name: Databricks CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  databricks-deploy-run:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_SECRET }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt databricks-cli

      - name: Configure Databricks CLI
        run: |
          databricks configure --token <<'EOF'
          ${{ secrets.DATABRICKS_HOST_SECRET }}
          ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: Import project into Databricks workspace
        run: |
          databricks workspace import_dir "." "/Workspace/Users/harishhrapuri@gmail.com/Project Spark-Sensei" --overwrite

      - name: Create Databricks job
        run: |
          echo '{
            "name": "spark-sensei-ci-job",
            "notebook_task": {
              "notebook_path": "/Workspace/Users/harishhrapuri@gmail.com/Project Spark-Sensei/validation"
            },
            "new_cluster": {
              "spark_version": "13.3.x-scala2.12",
              "node_type_id": "Standard_DS3_v2",
              "num_workers": 2
            }
          }' > jobs.json
          JOB_ID=$(databricks jobs create --json-file jobs.json | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" > job_id.env
          cat job_id.env

      - name: Run Databricks job
        run: |
          source job_id.env
          databricks jobs run-now --job-id $JOB_ID
